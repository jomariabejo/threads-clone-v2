<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page metadata is managed by React PageMeta -->
    <title>2026 Boilerplate</title>

    <!-- Favicon and Touch Icons -->
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <link rel="manifest" href="favicon/site.webmanifest" />

    <!--
    Speculation Rules API for faster page navigation (Chrome 121+)
    https://developer.mozilla.org/en-US/docs/Web/API/Speculation_Rules_API
    -->
    <script type="speculationrules">
      {
        "prefetch": [{ "where": { "href_matches": "/*" }, "eagerness": "moderate" }]
      }
    </script>

    <!-- Fallback for Firefox and Safari -->
    <script src="/js/speculation-rules-fallback.js"></script>
  </head>
  <body>
    <noscript>
      You need to enable Javascript to run this website.
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
